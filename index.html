<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日财经政治要闻</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: #f5f7fa;
            color: #333;
            max-width: 700px;
            margin: 20px auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #1e3c72;
            margin-bottom: 5px;
        }
        .date { text-align: center; color: #888; font-size: 14px; margin-bottom: 25px; }
        .news-item {
            background: white;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: transform 0.1s;
        }
        .news-item:hover { transform: translateY(-2px); }
        .news-item .title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .news-item .title a {
            color: #1a0dab;
            text-decoration: none;
        }
        .news-item .title a:hover { text-decoration: underline; }
        .news-item .source {
            color: #999;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
        }
        .hot-tag {
            background: #ff4757;
            color: white;
            border-radius: 6px;
            padding: 0 6px;
            font-size: 11px;
            margin-left: 8px;
        }
        .footer {
            text-align: center;
            margin-top: 40px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <h1>📰 每日财经政治要闻</h1>
    <div class="date" id="updateTime"></div>
    <div id="newsList">加载中...</div>
    <div class="footer">每天早晨7:00自动更新 · 数据来源公开网络</div>
    <script>
        fetch('news.json')
            .then(res => res.json())
            .then(data => {
                document.getElementById('updateTime').textContent = '更新于 ' + data.updateTime;
                const list = document.getElementById('newsList');
                list.innerHTML = '';
                data.news.forEach((item, idx) => {
                    const div = document.createElement('div');
                    div.className = 'news-item';
                    div.innerHTML = `
                        <div class="title">
                            <a href="${item.url}" target="_blank" rel="noopener">${idx+1}. ${item.title}</a>
                            ${item.hot ? `<span class="hot-tag">🔥 ${item.hot}</span>` : ''}
                        </div>
                        <div class="source">
                            <span>来源：${item.source || '聚合新闻'}</span>
                            <span>${item.time || ''}</span>
                        </div>`;
                    list.appendChild(div);
                });
                if (data.news.length === 0) {
                    list.innerHTML = '<p style="text-align:center; color:#888;">今日暂无符合条件的新闻</p>';
                }
            })
            .catch(() => {
                document.getElementById('newsList').innerHTML = '<p style="text-align:center; color:#c00;">新闻加载失败，请稍后再试</p>';
            });
    </script>
</body>
</html>
